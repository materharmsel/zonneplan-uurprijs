# Logrotate-configuratie voor zonneplan-uurprijs
#
# Installeren:
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/zonneplan-uurprijs
#
# Pas het pad aan als je home-map niet /home/pi is.

/home/pi/zonneplan-uurprijs/logs/*.log {
    weekly
    rotate 4
    compress
    missingok
    notifempty
    copytruncate
}
