inverters:
  steca:
    name: "StecaGrid 2500"
    ip: "192.168.178.6"
    nominal_watts: 2500
    min_watts: 500
    step_size: 10              # W per knopdruk (bepaald tijdens calibratie)
    button_delay_ms: 300       # delay na elke knopdruk in menu-navigatie
    screenshot_settle_ms: 800  # extra pauze vóór screenshot (anti menu-state-reset)
    value_step_delay_ms: 100   # snellere delay voor waarde-stap-loop (geen screenshot)
    service_button_long: false # ESC+SET kort indrukken
    api_style: new             # /page.main.html?BUTTON_PRESSED=...

  kostal:
    name: "Kostal Piko 4.2 MP"
    ip: "192.168.178.5"
    nominal_watts: 4200
    min_watts: 500
    step_size: 100             # W per knopdruk (te verifieren tijdens calibratie)
    button_delay_ms: 300
    screenshot_settle_ms: 800
    value_step_delay_ms: 100
    service_button_long: true  # SERVICE moet lang ingedrukt bij Kostal
    api_style: legacy          # /buttons.html?BUTTON=...&EVENT=clicked|long|released
